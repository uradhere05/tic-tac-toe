<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pong — FILO Gang</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff; padding: 16px;
    }

    /* ── Screens ── */
    .screen {
      display: none; flex-direction: column; align-items: center;
      width: 100%; max-width: 640px;
      overflow-y: auto; max-height: 100vh; max-height: 100dvh; padding-bottom: 40px;
      scrollbar-width: none;
    }
    .screen::-webkit-scrollbar { display: none; }
    .screen.active { display: flex; }

    /* ── Title ── */
    h1 {
      font-size: 2.2rem; letter-spacing: 5px; text-transform: uppercase;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px;
    }
    .game-title {
      font-size: 1.1rem; letter-spacing: 6px; text-transform: uppercase;
      color: #fff; opacity: 0.75; margin-bottom: 8px;
    }
    .slogan {
      font-size: 0.78rem; letter-spacing: 1.5px; font-style: italic;
      color: #ffd200; opacity: 0.85; margin-bottom: 24px; text-align: center;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 15px; border: none; border-radius: 50px;
      font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; font-weight: 700;
      transition: transform 0.1s, opacity 0.12s;
      margin-bottom: 12px; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary  { background: linear-gradient(90deg, #f7971e, #ffd200); color: #1a1a2e; }
    .btn-secondary{ background: rgba(255,255,255,0.09); color: #fff; border: 1.5px solid rgba(255,255,255,0.2); }
    .btn-danger   { background: rgba(255,80,80,0.12); color: #ff8888; border: 1.5px solid rgba(255,80,80,0.25); }
    .btn-sm { width: auto; padding: 10px 22px; font-size: 0.75rem; margin-bottom: 0; }
    .btn-row { display: flex; gap: 10px; width: 100%; }
    .btn-row .btn { margin-bottom: 0; }

    /* ── Scoreboard ── */
    .scoreboard {
      display: flex; gap: 40px; margin-bottom: 14px;
    }
    .score-box {
      text-align: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 8px 22px;
      min-width: 80px;
    }
    .score-label { font-size: 0.72rem; opacity: 0.6; margin-bottom: 4px; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
    .score-val   { font-size: 1.8rem; font-weight: 700; }
    .score-box.left-box .score-val  { color: #f7971e; }
    .score-box.right-box .score-val { color: #56ccf2; }

    /* ── Canvas ── */
    canvas {
      display: block;
      width: min(600px, calc(100vw - 32px));
      aspect-ratio: 600 / 340;
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      background: rgba(0,0,0,0.35);
      touch-action: none;
    }

    /* ── Touch controls ── */
    .touch-controls {
      display: flex; gap: 12px; margin-top: 12px; width: 100%;
    }
    .touch-btn {
      flex: 1; height: 52px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.14);
      border-radius: 14px; color: #fff;
      font-size: 1.3rem; cursor: pointer;
      user-select: none; -webkit-tap-highlight-color: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
    }
    .touch-btn:active, .touch-btn.pressed { background: rgba(255,255,255,0.18); }

    /* ── Player badge ── */
    .player-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.14);
      border-radius: 30px; padding: 6px 16px;
      font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 4px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-left  { background: #f7971e; }
    .dot-right { background: #56ccf2; }

    /* ── VS display ── */
    .vs-display {
      font-size: 0.72rem; letter-spacing: 1px; opacity: 0.5;
      margin-bottom: 10px; text-align: center;
    }

    /* ── Status ── */
    .status { font-size: 0.9rem; letter-spacing: 1.5px; min-height: 22px; margin-bottom: 10px; text-align: center; }
    .left-c  { color: #f7971e; font-weight: 700; }
    .right-c { color: #56ccf2; font-weight: 700; }
    .win-c   { color: #ffd200; font-weight: 700; }
    .dim-c   { color: #aaa;    font-weight: 700; }

    /* ── Connection indicator ── */
    .conn-bar {
      display: flex; align-items: center; gap: 6px; margin-top: 12px;
      font-size: 0.68rem; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.4;
    }
    .cdot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; }
    .cdot.off { background: #f44336; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.2; } }

    /* ── Code box (waiting) ── */
    .code-box {
      width: 100%; max-width: 340px;
      background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 22px; text-align: center; margin-bottom: 18px;
    }
    .code-label { font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.45; margin-bottom: 8px; }

    /* ── Spinner ── */
    .spinner {
      width: 34px; height: 34px; border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #ffd200; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 16px auto 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Champion ── */
    .trophy-icon { font-size: 3.6rem; margin-bottom: 4px; animation: tbounce 1.2s ease-in-out infinite alternate; }
    @keyframes tbounce { from { transform: translateY(0) rotate(-5deg); } to { transform: translateY(-10px) rotate(5deg); } }

    /* ── Toast ── */
    #toast {
      position: fixed; top: 18px; left: 50%;
      transform: translateX(-50%) translateY(-70px);
      background: #ffd200; color: #1a1a2e;
      padding: 10px 22px; border-radius: 30px;
      font-weight: 700; font-size: 0.82rem; letter-spacing: 1px;
      transition: transform 0.28s cubic-bezier(.34,1.56,.64,1);
      z-index: 999; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ══ WAITING ══ -->
<div class="screen active" id="s-wait">
  <h1>Pong</h1>
  <div class="game-title">FILO Gang</div>
  <div class="slogan">Real-time Pong battles!</div>
  <div class="code-box">
    <div class="code-label">Finding opponent…</div>
    <div class="spinner"></div>
  </div>
  <p style="opacity:.45;font-size:.82rem;letter-spacing:1px;margin-top:6px;text-align:center;">Waiting for another player to join Pong!</p>
  <button class="btn btn-danger btn-sm" style="margin-top:22px;" onclick="cancelGame()">Cancel</button>
</div>

<!-- ══ GAME ══ -->
<div class="screen" id="s-game">
  <h1 style="margin-bottom:2px;">Pong</h1>
  <div class="game-title" style="margin-bottom:4px;">FILO Gang</div>

  <div class="player-badge">
    <span class="dot dot-left" id="bdot"></span>
    <span id="btext">You</span>
  </div>
  <div class="vs-display" id="vs-display"></div>

  <div class="scoreboard">
    <div class="score-box left-box">
      <div class="score-label" id="sl-left">Left</div>
      <div class="score-val" id="sc-left">0</div>
    </div>
    <div class="score-box right-box">
      <div class="score-label" id="sl-right">Right</div>
      <div class="score-val" id="sc-right">0</div>
    </div>
  </div>

  <div class="status" id="status"></div>

  <canvas id="pongCanvas" width="600" height="340"></canvas>

  <div class="touch-controls">
    <button class="touch-btn" id="btn-up">▲</button>
    <button class="touch-btn" id="btn-dn">▼</button>
  </div>

  <div class="conn-bar">
    <span class="cdot" id="cdot"></span>
    <span id="ctext">Connected</span>
  </div>
</div>

<!-- ══ CHAMPION ══ -->
<div class="screen" id="s-champ">
  <div class="trophy-icon">🏆</div>
  <h1>Pong</h1>
  <div class="game-title" style="margin-bottom:8px;">Champion!</div>
  <div class="slogan" id="champ-sub" style="margin-bottom:28px;">First to 5 wins!</div>
  <div class="btn-row" style="width:100%;">
    <button class="btn btn-primary"   onclick="requestRematch()">New Game</button>
    <button class="btn btn-secondary" onclick="goHome()">Home</button>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
  /* ── Constants ── */
  const PEER_ID    = 'filo-gang-pong-room';
  const WINS_NEED  = 5;
  const DB         = 'https://filo-gang-tictactoe-default-rtdb.firebaseio.com';

  const CW = 600, CH = 340;         // logical canvas size
  const PW = 12,  PH = 70;          // paddle dimensions
  const PSPEED = 7;                  // paddle pixels per frame
  const BR = 9;                      // ball radius
  const BASE_SPD = 5, MAX_SPD = 13; // ball speed bounds

  /* ── State ── */
  let myName = localStorage.getItem('filoName') || '';
  if (!myName) { window.location.href = 'index.html'; }

  let opponentName = '';
  let peer = null, conn = null;
  let mySide = null;   // 'left' | 'right'
  let gameRunning = false;
  let animFrameId = null;
  let scores = { left: 0, right: 0 };

  /* ── Canvas ── */
  const canvas = document.getElementById('pongCanvas');
  const ctx    = canvas.getContext('2d');
  canvas.width = CW; canvas.height = CH;

  /* ── Game objects ── */
  const ball = { x: CW / 2, y: CH / 2, vx: BASE_SPD, vy: BASE_SPD * 0.8 };

  const leftPaddle  = { x: 14,          y: CH / 2 - PH / 2, w: PW, h: PH };
  const rightPaddle = { x: CW - PW - 14, y: CH / 2 - PH / 2, w: PW, h: PH };

  /* ── Keyboard input ── */
  const keys = {};
  document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (['ArrowUp','ArrowDown','w','s','W','S'].includes(e.key)) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  /* ── On-screen button input ── */
  let touchUp = false, touchDn = false;

  function bindTouchBtn(id, isUp) {
    const el = document.getElementById(id);
    const start = e => { e.preventDefault(); if (isUp) touchUp = true; else touchDn = true; el.classList.add('pressed'); };
    const end   = ()  => { if (isUp) touchUp = false; else touchDn = false; el.classList.remove('pressed'); };
    el.addEventListener('touchstart',  start, { passive: false });
    el.addEventListener('mousedown',   start);
    el.addEventListener('touchend',    end);
    el.addEventListener('touchcancel', end);
    el.addEventListener('mouseup',     end);
    el.addEventListener('mouseleave',  end);
  }
  bindTouchBtn('btn-up', true);
  bindTouchBtn('btn-dn', false);

  /* ── Canvas drag-to-move ── */
  canvas.addEventListener('touchstart', onCanvasTouch, { passive: false });
  canvas.addEventListener('touchmove',  onCanvasTouch, { passive: false });

  function onCanvasTouch(e) {
    e.preventDefault();
    if (!gameRunning || !mySide) return;
    const touch = e.touches[0];
    const rect  = canvas.getBoundingClientRect();
    const scaleY = CH / rect.height;
    const y = (touch.clientY - rect.top) * scaleY;
    const p = mySide === 'left' ? leftPaddle : rightPaddle;
    p.y = Math.max(0, Math.min(CH - PH, y - PH / 2));
  }

  /* ── Screens ── */
  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  /* ── Firebase ── */
  function getWeekKey() {
    const now = new Date();
    const diff = now.getDay() === 0 ? -6 : 1 - now.getDay();
    const mon = new Date(now); mon.setDate(now.getDate() + diff);
    return `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;
  }

  async function recordWin(name) {
    const url = `${DB}/pong-leaderboard/${getWeekKey()}/${encodeURIComponent(name)}.json`;
    try {
      const cur = await fetch(url).then(r => r.json()).catch(() => 0) || 0;
      await fetch(url, { method: 'PUT', body: JSON.stringify(cur + 1) });
    } catch(e) { console.error('Firebase write error', e); }
  }

  /* ── Helpers ── */
  function send(data) { if (conn && conn.open) conn.send(data); }
  function setConn(on) {
    document.getElementById('cdot').className = 'cdot' + (on ? '' : ' off');
    document.getElementById('ctext').textContent = on ? 'Connected' : 'Disconnected';
  }
  function setStatus(html) { document.getElementById('status').innerHTML = html; }
  function refreshScores() {
    document.getElementById('sc-left').textContent  = scores.left;
    document.getElementById('sc-right').textContent = scores.right;
  }

  let toastT;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => el.classList.remove('show'), 2800);
  }

  /* ── PeerJS config ── */
  const PEER_CFG = {
    debug: 0,
    config: { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun2.l.google.com:19302' },
    ]}
  };

  /* ── Heartbeat ── */
  let heartbeat;
  function startHeartbeat() {
    clearInterval(heartbeat);
    heartbeat = setInterval(() => send({ type: 'ping' }), 6000);
  }
  function stopHeartbeat() { clearInterval(heartbeat); }

  function destroyPeer() {
    stopHeartbeat(); stopLoop();
    try { conn && conn.close(); } catch(_) {}
    try { peer && peer.destroy(); } catch(_) {}
    conn = null; peer = null;
  }

  /* ── Game loop ── */
  function startLoop() {
    stopLoop();
    gameRunning = true;
    animFrameId = requestAnimationFrame(loop);
  }

  function stopLoop() {
    gameRunning = false;
    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  }

  function loop() {
    if (!gameRunning) return;
    update();
    draw();
    animFrameId = requestAnimationFrame(loop);
  }

  /* ── Game start ── */
  function startPongGame() {
    mySide = 'left';
    document.getElementById('bdot').className = 'dot dot-left';
    document.getElementById('btext').textContent = myName + ' (Left)';
    updateNameDisplays();
    setConn(true);
    show('s-game');
    resetBall();
    startLoop();
  }

  function joinPongGame() {
    mySide = 'right';
    document.getElementById('bdot').className = 'dot dot-right';
    document.getElementById('btext').textContent = myName + ' (Right)';
    updateNameDisplays();
    setConn(true);
    show('s-game');
    ball.x = CW / 2; ball.y = CH / 2; ball.vx = 0; ball.vy = 0;
    startLoop();
  }

  function updateNameDisplays() {
    const leftName  = mySide === 'left'  ? myName : opponentName;
    const rightName = mySide === 'right' ? myName : opponentName;
    document.getElementById('sl-left').textContent  = leftName  || 'Left';
    document.getElementById('sl-right').textContent = rightName || 'Right';
    document.getElementById('vs-display').textContent = opponentName ? `vs ${opponentName}` : '';
    setStatus('');
  }

  /* ── Room entry ── */
  function enterPongRoom() {
    show('s-wait');
    peer = new Peer(PEER_ID, PEER_CFG);

    peer.on('open', () => {
      peer.on('disconnected', () => { try { peer.reconnect(); } catch(_) {} });
      peer.on('connection', c => {
        conn = c; wireConn();
        conn.on('open', () => {
          conn.send({ type: 'start', hostName: myName });
          startPongGame();
          startHeartbeat();
        });
      });
    });

    peer.on('error', err => {
      if (err.type === 'unavailable-id') {
        destroyPeer(); joinPongRoom();
      } else {
        destroyPeer();
        toast('Connection error — try again.');
        setTimeout(() => window.location.href = 'index.html', 2000);
      }
    });
  }

  function joinPongRoom() {
    peer = new Peer(PEER_CFG);

    const giveUp = setTimeout(() => {
      destroyPeer();
      toast('No host found — try again.');
      setTimeout(() => window.location.href = 'index.html', 2000);
    }, 10000);

    peer.on('disconnected', () => { try { peer.reconnect(); } catch(_) {} });

    peer.on('open', () => {
      conn = peer.connect(PEER_ID, { reliable: true, serialization: 'json' });
      wireConn();
      conn.on('open', () => { clearTimeout(giveUp); startHeartbeat(); });
    });

    peer.on('error', () => {
      clearTimeout(giveUp); destroyPeer();
      toast('Could not join Pong — try again.');
      setTimeout(() => window.location.href = 'index.html', 2000);
    });
  }

  function wireConn() {
    conn.on('data',  handleData);
    conn.on('close', onDrop);
    conn.on('error', onDrop);
  }

  /* ── Incoming messages ── */
  function handleData(msg) {
    switch (msg.type) {
      case 'ping':
        send({ type: 'pong' });
        break;
      case 'pong':
        break;
      case 'start':
        opponentName = msg.hostName || '?';
        joinPongGame();
        send({ type: 'player-name', name: myName });
        break;
      case 'player-name':
        opponentName = msg.name;
        updateNameDisplays();
        break;
      case 'paddle-pos':
        if (mySide === 'left')  rightPaddle.y = msg.y;
        else                    leftPaddle.y  = msg.y;
        break;
      case 'ball-state':
        ball.x  = msg.x;  ball.y  = msg.y;
        ball.vx = msg.vx; ball.vy = msg.vy;
        break;
      case 'score':
        scores.left  = msg.left;
        scores.right = msg.right;
        refreshScores();
        if (msg.reset) {
          // Centre ball visually while waiting for host's ball-state updates
          ball.x = CW / 2; ball.y = CH / 2; ball.vx = 0; ball.vy = 0;
        }
        break;
      case 'game-over':
        stopLoop();
        showChampion(
          (mySide === 'left'  && scores.left  >= WINS_NEED) ||
          (mySide === 'right' && scores.right >= WINS_NEED)
        );
        break;
      case 'rematch':
        doRematch();
        break;
    }
  }

  /* ── Physics update (called every frame) ── */
  function update() {
    const myPaddle = mySide === 'left' ? leftPaddle : rightPaddle;

    // Move my paddle via keyboard or touch
    const goUp = keys['w'] || keys['W'] || keys['ArrowUp']   || touchUp;
    const goDn = keys['s'] || keys['S'] || keys['ArrowDown'] || touchDn;
    if (goUp) myPaddle.y = Math.max(0,      myPaddle.y - PSPEED);
    if (goDn) myPaddle.y = Math.min(CH - PH, myPaddle.y + PSPEED);
    send({ type: 'paddle-pos', y: myPaddle.y });

    // Only the host (left) drives ball physics
    if (mySide !== 'left') return;

    ball.x += ball.vx;
    ball.y += ball.vy;

    // Top / bottom wall bounce
    if (ball.y - BR <= 0)      { ball.y = BR;      ball.vy =  Math.abs(ball.vy); }
    if (ball.y + BR >= CH)     { ball.y = CH - BR; ball.vy = -Math.abs(ball.vy); }

    // Left paddle collision
    if (ball.vx < 0 &&
        ball.x - BR <= leftPaddle.x + PW &&
        ball.x - BR >= leftPaddle.x - 2 &&
        ball.y + BR >= leftPaddle.y &&
        ball.y - BR <= leftPaddle.y + PH) {
      ball.x = leftPaddle.x + PW + BR;
      bouncePaddle(leftPaddle, 1);
    }

    // Right paddle collision
    if (ball.vx > 0 &&
        ball.x + BR >= rightPaddle.x &&
        ball.x + BR <= rightPaddle.x + PW + 2 &&
        ball.y + BR >= rightPaddle.y &&
        ball.y - BR <= rightPaddle.y + PH) {
      ball.x = rightPaddle.x - BR;
      bouncePaddle(rightPaddle, -1);
    }

    // Scoring
    if (ball.x < 0) {
      scores.right++;
      onPoint();
    } else if (ball.x > CW) {
      scores.left++;
      onPoint();
    } else {
      send({ type: 'ball-state', x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy });
    }
  }

  function bouncePaddle(paddle, xSign) {
    const rel   = (ball.y - (paddle.y + PH / 2)) / (PH / 2); // -1 to 1
    const angle = rel * (Math.PI / 4);                         // max 45°
    const spd   = Math.min(Math.hypot(ball.vx, ball.vy) + 0.5, MAX_SPD);
    ball.vx = xSign * spd * Math.cos(angle);
    ball.vy = spd * Math.sin(angle);
  }

  function onPoint() {
    refreshScores();
    if (scores.left >= WINS_NEED || scores.right >= WINS_NEED) {
      send({ type: 'score', left: scores.left, right: scores.right, reset: false });
      stopLoop();
      send({ type: 'game-over' });
      showChampion(scores.left >= WINS_NEED);
    } else {
      send({ type: 'score', left: scores.left, right: scores.right, reset: true });
      resetBall();
    }
  }

  function resetBall() {
    ball.x  = CW / 2;
    ball.y  = CH / 2;
    const angle = (Math.random() * 0.5 - 0.25); // -0.25…0.25 rad
    const dir   = Math.random() > 0.5 ? 1 : -1;
    ball.vx = dir * BASE_SPD * Math.cos(angle);
    ball.vy = BASE_SPD * Math.sin(angle) * (Math.random() > 0.5 ? 1 : -1);
  }

  /* ── Draw ── */
  function draw() {
    ctx.clearRect(0, 0, CW, CH);

    // Centre dashed line
    ctx.save();
    ctx.setLineDash([6, 14]);
    ctx.beginPath();
    ctx.moveTo(CW / 2, 0);
    ctx.lineTo(CW / 2, CH);
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Paddles
    ctx.fillStyle = '#f7971e';
    ctx.beginPath();
    ctx.roundRect(leftPaddle.x,  leftPaddle.y,  PW, PH, 4);
    ctx.fill();

    ctx.fillStyle = '#56ccf2';
    ctx.beginPath();
    ctx.roundRect(rightPaddle.x, rightPaddle.y, PW, PH, 4);
    ctx.fill();

    // Ball
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BR, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd200';
    ctx.shadowColor = '#ffd200';
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  /* ── Champion screen ── */
  function showChampion(iAmWinner) {
    const winner = iAmWinner ? myName : (opponentName || 'Opponent');
    document.getElementById('champ-sub').textContent =
      iAmWinner ? `${myName} is the Pong Champion! 🎉` : `${winner} is the Pong Champion!`;
    if (iAmWinner) {
      recordWin(myName);
      setTimeout(() => toast(`${myName} added to the leaderboard!`), 600);
    }
    show('s-champ');
  }

  function requestRematch() {
    send({ type: 'rematch' });
    doRematch();
  }

  function doRematch() {
    scores = { left: 0, right: 0 };
    refreshScores();
    show('s-game');
    if (mySide === 'left') resetBall();
    startLoop();
  }

  function goHome() {
    destroyPeer();
    opponentName = '';
    scores = { left: 0, right: 0 };
    refreshScores();
    window.location.href = 'index.html';
  }

  function cancelGame() {
    destroyPeer();
    window.location.href = 'index.html';
  }

  function onDrop() {
    stopHeartbeat(); setConn(false); stopLoop();
    setStatus(`<span class="dim-c">Opponent disconnected</span>`);
  }

  /* ── Boot ── */
  draw(); // initial blank frame
  enterPongRoom();
</script>
</body>
</html>
