<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Tic Tac Toe – Multiplayer</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      padding: 20px;
    }

    /* ── Screens ── */
    .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 380px; }
    .screen.active { display: flex; }

    /* ── Title ── */
    h1 {
      font-size: 2.2rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 36px;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 50px;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.1s, opacity 0.12s;
      margin-bottom: 12px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(90deg, #f7971e, #ffd200); color: #1a1a2e; }
    .btn-secondary { background: rgba(255,255,255,0.09); color: #fff; border: 1.5px solid rgba(255,255,255,0.2); }
    .btn-danger { background: rgba(255,80,80,0.12); color: #ff8888; border: 1.5px solid rgba(255,80,80,0.25); }
    .btn-sm { width: auto; padding: 10px 22px; font-size: 0.75rem; margin-bottom: 0; }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      width: 100%; margin: 4px 0 16px;
      font-size: 0.72rem; letter-spacing: 2px; opacity: 0.35;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.3); }

    /* ── Input ── */
    input {
      width: 100%;
      padding: 15px;
      border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 1.4rem;
      letter-spacing: 8px;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      margin-bottom: 12px;
      font-weight: 700;
    }
    input::placeholder { letter-spacing: 2px; opacity: 0.35; font-size: 0.85rem; font-weight: 400; }
    input:focus { border-color: #ffd200; }

    /* ── Room code box ── */
    .code-box {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 22px;
      text-align: center;
      margin-bottom: 18px;
    }
    .code-label { font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.45; margin-bottom: 8px; }
    .code-value { font-size: 2.8rem; font-weight: 900; letter-spacing: 10px; color: #ffd200; }

    /* ── Spinner ── */
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #ffd200;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 18px auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Player badge ── */
    .player-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.14);
      border-radius: 30px;
      padding: 7px 18px;
      font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 14px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-x { background: #f7971e; }
    .dot-o { background: #56ccf2; }

    /* ── Scoreboard ── */
    .scoreboard { display: flex; gap: 10px; width: 100%; margin-bottom: 14px; }
    .score-box {
      flex: 1; text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 9px 4px;
    }
    .score-box .sl { font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.55; }
    .score-box .sv { font-size: 1.6rem; font-weight: 700; }
    .score-box.sx .sv { color: #f7971e; }
    .score-box.so .sv { color: #56ccf2; }

    /* ── Status ── */
    .status {
      font-size: 0.95rem; letter-spacing: 2px;
      height: 26px; margin-bottom: 14px; text-align: center;
    }
    .xt { color: #f7971e; font-weight: 700; }
    .ot { color: #56ccf2; font-weight: 700; }
    .wt { color: #ffd200; font-weight: 700; }
    .dt { color: #aaa;    font-weight: 700; }

    /* ── Board ── */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 18px;
    }
    .cell {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.11);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.6rem; font-weight: 900;
      cursor: pointer;
      transition: background 0.14s, transform 0.08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .cell:active:not(.taken) { transform: scale(0.93); background: rgba(255,255,255,0.12); }
    .cell.taken { cursor: default; }
    .cell.x { color: #f7971e; text-shadow: 0 0 18px #f7971e77; }
    .cell.o { color: #56ccf2; text-shadow: 0 0 18px #56ccf277; }
    .cell.winning {
      background: rgba(255,210,0,0.14);
      border-color: #ffd200;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { box-shadow: 0 0 6px #ffd20033; }
      to   { box-shadow: 0 0 22px #ffd200bb; }
    }
    .mark { transform: scale(0); animation: pop 0.2s ease-out forwards; }
    @keyframes pop {
      0%   { transform: scale(0) rotate(-12deg); opacity: 0; }
      70%  { transform: scale(1.18) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .cell.shake { animation: shake 0.35s ease-out; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-6px); }
      40%     { transform: translateX(6px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }
    .not-your-turn { cursor: not-allowed !important; }

    /* ── Game buttons ── */
    .btn-row { display: flex; gap: 10px; width: 100%; }
    .btn-row .btn { margin-bottom: 0; }

    /* ── Connection indicator ── */
    .conn-bar {
      display: flex; align-items: center; gap: 6px;
      margin-top: 14px;
      font-size: 0.68rem; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.45;
    }
    .cdot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; }
    .cdot.off { background: #f44336; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.2; } }

    /* ── Error ── */
    .err { color: #ff8888; font-size: 0.8rem; letter-spacing: 1px; min-height: 18px; margin-top: 4px; text-align: center; }

    /* ── Toast ── */
    #toast {
      position: fixed; top: 18px; left: 50%;
      transform: translateX(-50%) translateY(-70px);
      background: #ffd200; color: #1a1a2e;
      padding: 10px 22px; border-radius: 30px;
      font-weight: 700; font-size: 0.82rem; letter-spacing: 1px;
      transition: transform 0.28s cubic-bezier(.34,1.56,.64,1);
      z-index: 999; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Footer ── */
    footer {
      position: fixed; bottom: 14px;
      font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.25;
    }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ══ LOBBY ══ -->
<div class="screen active" id="s-lobby">
  <h1>Tic Tac Toe</h1>
  <div class="subtitle">Multiplayer</div>

  <button class="btn btn-primary" onclick="createGame()">Create Game</button>

  <div class="divider">or join</div>

  <input id="join-input" type="text" maxlength="6" placeholder="Room code"
         oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')" />
  <button class="btn btn-secondary" onclick="joinGame()">Join Game</button>
  <div class="err" id="lobby-err"></div>
</div>

<!-- ══ WAITING ══ -->
<div class="screen" id="s-wait">
  <h1>Tic Tac Toe</h1>
  <div class="subtitle">Waiting for opponent…</div>
  <div class="code-box">
    <div class="code-label">Room Code</div>
    <div class="code-value" id="code-display"></div>
  </div>
  <button class="btn btn-secondary btn-sm" onclick="copyCode()">Copy Code</button>
  <div class="spinner"></div>
  <p style="opacity:.45;font-size:.82rem;letter-spacing:1px;margin-top:6px;">Share this code with your friend</p>
  <button class="btn btn-danger btn-sm" style="margin-top:22px;" onclick="cancelGame()">Cancel</button>
</div>

<!-- ══ GAME ══ -->
<div class="screen" id="s-game">
  <div class="player-badge" id="badge">
    <span class="dot dot-x" id="bdot"></span>
    <span id="btext">You are X</span>
  </div>

  <div class="scoreboard">
    <div class="score-box sx"><div class="sl">X</div><div class="sv" id="sc-x">0</div></div>
    <div class="score-box">   <div class="sl">Draw</div><div class="sv" id="sc-d">0</div></div>
    <div class="score-box so"><div class="sl">O</div><div class="sv" id="sc-o">0</div></div>
  </div>

  <div class="status" id="status"><span class="xt">X's Turn</span></div>

  <div class="board" id="board">
    <div class="cell" onclick="tap(0)"></div>
    <div class="cell" onclick="tap(1)"></div>
    <div class="cell" onclick="tap(2)"></div>
    <div class="cell" onclick="tap(3)"></div>
    <div class="cell" onclick="tap(4)"></div>
    <div class="cell" onclick="tap(5)"></div>
    <div class="cell" onclick="tap(6)"></div>
    <div class="cell" onclick="tap(7)"></div>
    <div class="cell" onclick="tap(8)"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary"   onclick="requestRestart()">Play Again</button>
    <button class="btn btn-danger"    onclick="leaveGame()">Leave</button>
  </div>

  <div class="conn-bar">
    <span class="cdot" id="cdot"></span>
    <span id="ctext">Connected</span>
  </div>
</div>

<footer>Created by ADML &mdash; 2026</footer>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
  /* ── Constants ── */
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const PREFIX = 'adml-ttt-';

  /* ── State ── */
  let peer = null, conn = null;
  let myPiece = null, roomCode = '';
  let board = Array(9).fill(null), current = 'X', over = false;
  let scores = {X:0,O:0,D:0};
  let wantsRestart = false;

  const cells = document.querySelectorAll('.cell');

  /* ── Screens ── */
  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  /* ── Helpers ── */
  function randCode() {
    const abc = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    return Array.from({length:6}, () => abc[Math.floor(Math.random()*abc.length)]).join('');
  }

  function send(data) { if (conn && conn.open) conn.send(data); }

  function lobbyErr(msg) { document.getElementById('lobby-err').textContent = msg; }

  function setConn(on) {
    document.getElementById('cdot').className = 'cdot' + (on ? '' : ' off');
    document.getElementById('ctext').textContent = on ? 'Connected' : 'Disconnected';
  }

  let toastT;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => el.classList.remove('show'), 2600);
  }

  function destroyPeer() {
    try { conn && conn.close(); } catch(_){}
    try { peer && peer.destroy(); } catch(_){}
    conn = null; peer = null;
  }

  /* ── Create / Join ── */
  function createGame() {
    roomCode = randCode();
    document.getElementById('code-display').textContent = roomCode;
    show('s-wait');

    peer = new Peer(PREFIX + roomCode, {debug:0});

    peer.on('error', err => {
      destroyPeer();
      if (err.type === 'unavailable-id') { createGame(); return; }
      lobbyErr('Connection error — try again.'); show('s-lobby');
    });

    peer.on('connection', c => {
      conn = c;
      myPiece = 'X';
      wireConn();
      conn.on('open', () => {
        conn.send({type:'start', piece:'O'});
        startGame();
      });
    });
  }

  function joinGame() {
    const code = document.getElementById('join-input').value.trim().toUpperCase();
    if (code.length !== 6) { lobbyErr('Enter the full 6-character code.'); return; }
    lobbyErr('');

    peer = new Peer({debug:0});

    let timedOut = false;
    const giveUp = setTimeout(() => {
      timedOut = true;
      destroyPeer();
      lobbyErr('Room not found — check the code.');
      show('s-lobby');
    }, 9000);

    peer.on('open', () => {
      if (timedOut) return;
      conn = peer.connect(PREFIX + code, {reliable:true});
      myPiece = 'O';
      wireConn();
    });

    peer.on('error', () => {
      if (timedOut) return;
      clearTimeout(giveUp);
      destroyPeer();
      lobbyErr('Could not connect — check the code.');
      show('s-lobby');
    });
  }

  function wireConn() {
    conn.on('data',  handleData);
    conn.on('close', onDrop);
    conn.on('error', onDrop);
  }

  /* ── Incoming messages ── */
  function handleData(msg) {
    if      (msg.type === 'start')          { myPiece = msg.piece; startGame(); }
    else if (msg.type === 'move')           { applyMove(msg.i); }
    else if (msg.type === 'restart-req')    { onRestartReq(); }
    else if (msg.type === 'restart-ok')     { doRestart(); }
  }

  /* ── Game start ── */
  function startGame() {
    const isX = myPiece === 'X';
    document.getElementById('bdot').className = 'dot dot-' + myPiece.toLowerCase();
    document.getElementById('btext').textContent = 'You are ' + myPiece;
    setConn(true);
    show('s-game');
    resetBoard();
  }

  /* ── Gameplay ── */
  function tap(i) {
    if (over) return;
    if (current !== myPiece) {
      shakeThenWarn(i);
      return;
    }
    if (board[i]) return;
    send({type:'move', i});
    applyMove(i);
  }

  function shakeThenWarn(i) {
    const cell = cells[i];
    cell.classList.remove('shake');
    void cell.offsetWidth; // reflow to restart animation
    cell.classList.add('shake');
    cell.addEventListener('animationend', () => cell.classList.remove('shake'), {once:true});
    toast("⏳ Wait for opponent's turn!");
  }

  function applyMove(i) {
    board[i] = current;
    const cell = cells[i];
    cell.classList.add(current.toLowerCase(), 'taken');
    cell.innerHTML = `<span class="mark">${current}</span>`;

    const win = findWin();
    if (win) {
      over = true; wantsRestart = false;
      scores[win.p]++;
      refreshScores();
      win.line.forEach(j => cells[j].classList.add('winning'));
      const mine = win.p === myPiece;
      setStatus(`<span class="wt">${mine ? 'You Win! 🎉' : 'Opponent Wins!'}</span>`);
    } else if (board.every(Boolean)) {
      over = true; wantsRestart = false;
      scores.D++;
      refreshScores();
      setStatus(`<span class="dt">It's a Draw!</span>`);
    } else {
      current = current === 'X' ? 'O' : 'X';
      const mine = current === myPiece;
      const cls  = current === 'X' ? 'xt' : 'ot';
      setStatus(`<span class="${cls}">${mine ? 'Your Turn' : "Opponent's Turn"}</span>`);
    }
    syncCursorClass();
  }

  function findWin() {
    for (const [a,b,c] of WINS)
      if (board[a] && board[a]===board[b] && board[a]===board[c])
        return { p: board[a], line:[a,b,c] };
    return null;
  }

  function setStatus(html) { document.getElementById('status').innerHTML = html; }
  function refreshScores() {
    document.getElementById('sc-x').textContent = scores.X;
    document.getElementById('sc-o').textContent = scores.O;
    document.getElementById('sc-d').textContent = scores.D;
  }

  /* ── Restart ── */
  function requestRestart() {
    if (wantsRestart) {               // they already asked → confirm
      doRestart(); send({type:'restart-ok'});
    } else {
      wantsRestart = true;
      send({type:'restart-req'});
      toast('Waiting for opponent…');
    }
  }

  function onRestartReq() {
    if (wantsRestart) {               // both want → go
      doRestart(); send({type:'restart-ok'});
    } else {
      wantsRestart = true;
      toast('Opponent wants to play again — tap Play Again!');
    }
  }

  function doRestart() {
    wantsRestart = false;
    resetBoard();
  }

  function resetBoard() {
    board = Array(9).fill(null); current = 'X'; over = false;
    cells.forEach(c => { c.className = 'cell'; c.innerHTML = ''; });
    const mine = myPiece === 'X';
    setStatus(`<span class="${mine?'xt':'ot'}">${mine?'Your Turn':"Opponent's Turn"}</span>`);
    syncCursorClass();
  }

  function syncCursorClass() {
    const notMine = over || current !== myPiece;
    cells.forEach(c => c.classList.toggle('not-your-turn', notMine));
  }

  /* ── Leave / disconnect ── */
  function leaveGame() {
    destroyPeer();
    scores = {X:0,O:0,D:0}; refreshScores();
    document.getElementById('join-input').value = '';
    lobbyErr('');
    show('s-lobby');
  }

  function cancelGame() { destroyPeer(); show('s-lobby'); }

  function onDrop() {
    setConn(false); over = true;
    setStatus(`<span class="dt">Opponent disconnected</span>`);
  }

  /* ── Copy code ── */
  function copyCode() {
    navigator.clipboard.writeText(roomCode)
      .then(() => toast('Code copied!'))
      .catch(() => toast(roomCode));
  }
</script>
</body>
</html>
